name: Swift Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Swift 6.0
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        working-directory: apple-perf-boost
        run: swift package resolve

      - name: Build (debug)
        working-directory: apple-perf-boost
        run: swift build -v

      - name: Build (release)
        working-directory: apple-perf-boost
        run: swift build -c release -v
